name: BUILD_BORINGSSL_CALLBACK(V3.5)

# 可复用 workflow —— 每次调用在独立 ubuntu-latest runner 上执行
# 由 build_ssl.yml 并行调用两次（static / shared），互不干扰

on:
  workflow_call:
    inputs:
      ssl_commit_id:
        required: true
        type: string
        description: "BoringSSL commit id"
      build_shared_libs:
        required: true
        type: string
        description: "'0' 编译静态库, '1' 编译共享库"
      release_archives:
        required: true
        type: boolean
        description: "是否推送镜像到 registry"
      tag_suffix:
        required: true
        type: string
        description: "镜像标签后缀，如 boringssl-static 或 boringssl"
      actor_lc:
        required: true
        type: string
        description: "github.actor 小写形式（用于 ghcr.io 路径）"
      dockerfile:
        required: false
        type: string
        default: "mainline/Base-BoringSSL.Dockerfile"
        description: "Dockerfile 路径（相对于 workspace）"
    secrets:
      DOCKERHUB_USERNAME:
        required: true
        description: "Docker Hub 用户名"
      DOCKERHUB_TOKEN:
        required: true
        description: "Docker Hub 访问令牌"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write

    steps:
      #- name: Free Disk-Space
      #  run: df -h && sudo apt-get clean && docker system prune -a -f && sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc && df -h

      - name: (Before)Free Disk-Space
        run: df -h

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3  # Use @main for latest, @v3 for stable
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          #remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          #remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"  # Use 'rmz' for faster deletion (default: 'rm')
          #rmz_version: "3.1.1"  # Required when rm_cmd is 'rmz'
          testing: false

      - name: (After)Free Disk-Space
        run: df -h

      - uses: actions/checkout@v7
        with:
          submodules: 'true'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:qemu-v10.2.1
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install System Tools
        run: |
          sudo apt install -y git curl wget tree subversion

      - name: init
        run: |
          mkdir -p ${{ github.workspace }}/mainline/conf/
          cp -rf ${{ github.workspace }}/conf/* ${{ github.workspace }}/mainline/conf/
          mkdir -p ${{ github.workspace }}/mainline/patch/
          cp -rf ${{ github.workspace }}/patch/* ${{ github.workspace }}/mainline/patch/
          mkdir -p ${{ github.workspace }}/mainline/tools/
          cp -rf ${{ github.workspace }}/tools/* ${{ github.workspace }}/mainline/tools/
          tree ${{ github.workspace }}/mainline/

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push
        uses: docker/build-push-action@v7
        with:
          context: ${{ github.workspace }}/mainline/
          file: ${{ github.workspace }}/${{ inputs.dockerfile }}
          platforms: |
            linux/amd64
            linux/arm64
          build-args: |
            BUILD_SHARED_LIBS=${{ inputs.build_shared_libs }}
            BORINGSSL_COMMIT_ID=${{ inputs.ssl_commit_id }}
          push: ${{ inputs.release_archives }}
          provenance: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/base-ssl:${{ inputs.ssl_commit_id }}-${{ inputs.tag_suffix }}
            ${{ secrets.DOCKERHUB_USERNAME }}/base-ssl:${{ inputs.tag_suffix }}-latest
            ghcr.io/${{ inputs.actor_lc }}/base-ssl:${{ inputs.ssl_commit_id }}-${{ inputs.tag_suffix }}
            ghcr.io/${{ inputs.actor_lc }}/base-ssl:${{ inputs.tag_suffix }}-latest
          #cache-from: type=registry,ref=ghcr.io/${{ inputs.actor_lc }}/base-ssl:${{ inputs.ssl_commit_id }}-${{ inputs.tag_suffix }}
          #cache-to: type=registry,ref=ghcr.io/${{ inputs.actor_lc }}/base-ssl:${{ inputs.ssl_commit_id }}-${{ inputs.tag_suffix }},mode=max
          # 完全禁用缓存(二选一)
          no-cache: true
