name: BUILD_BORINGSSL(V3.5)

on:
  workflow_dispatch:
    inputs:
      ssl_commit_id:
        description: "指定BoringSSL使用commit id版本"
        required: true
        default: "0.20260616.0"
        type: string
      build_ssl_static:
        description: "enable ssl static build"
        default: true
        type: boolean
      build_ssl_share:
        description: "enable ssl share build"
        default: true
        type: boolean
      release_archives:
        description: "enable release archives"
        default: true
        type: boolean

jobs:
  # ── 参数准备（公共前置） ──────────────────────────────────────────
  pre:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    outputs:
      default_commit_id: HEAD~0
      default_branch: ${{ steps.set_global_params.outputs.default_branch }}
      ACTOR_LC: ${{ steps.set_case_params.outputs.ACTOR_LC }}
      REPOSITORY_LC: ${{ steps.set_case_params.outputs.REPOSITORY_LC }}
    steps:
      - name: set global params
        id: set_global_params
        run: |
          echo "default_branch=main" >> "$GITHUB_OUTPUT"

      - name: set lower case name
        id: set_case_params
        run: |
          echo "ACTOR_LC=${ACTOR,,}" >> "$GITHUB_OUTPUT"
          echo "REPOSITORY_LC=${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
        env:
          ACTOR: '${{ github.actor }}'
          REPOSITORY: '${{ github.repository }}'

  # ── 静态库构建（独立机器，与 shared 并行） ────────────────────────
  build-ssl-static:
    if: ${{ inputs.build_ssl_static }}
    needs: [pre]
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/build-ssl-callable.yml
    with:
      ssl_commit_id: ${{ inputs.ssl_commit_id }}
      build_shared_libs: "0"
      release_archives: ${{ inputs.release_archives }}
      tag_suffix: "boringssl-static"
      dockerfile: "mainline/Base-BoringSSL.Dockerfile"
      actor_lc: ${{ needs.pre.outputs.ACTOR_LC }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ── 共享库构建（独立机器，与 static 并行） ────────────────────────
  build-ssl-shared:
    if: ${{ inputs.build_ssl_share }}
    needs: [pre]
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/build-ssl-callable.yml
    with:
      ssl_commit_id: ${{ inputs.ssl_commit_id }}
      build_shared_libs: "1"
      release_archives: ${{ inputs.release_archives }}
      tag_suffix: "boringssl"
      dockerfile: "mainline/Base-BoringSSL.Dockerfile"
      actor_lc: ${{ needs.pre.outputs.ACTOR_LC }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
